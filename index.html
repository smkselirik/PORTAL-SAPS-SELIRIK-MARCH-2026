            color: white;

        .school-logo {

<body>

<header class="text-center no-print">
    <div class="container">
        <img src="https://i.ibb.co/VYSKMXf1/Logo-Selirik.png" alt="Logo Selirik" class="school-logo">
        <h1 class="h3 fw-bold mb-0">SMK SELIRIK, KAPIT</h1>
        <p class="mb-0">Portal Peperiksaan Pertengahan 1 (Mac) 2026</p>
    </div>
</header>

<main class="container my-4">
    <div id="loginSection" class="login-container">
        <div class="card p-4">
            <h4 class="text-center mb-4"><i class="fas fa-lock me-2"></i>Log Masuk</h4>
            <div class="mb-3">
                <label class="form-label">ID Pengguna</label>
                <input type="text" id="userId" class="form-control" placeholder="Masukkan ID">
            </div>
            <div class="mb-3">
                <label class="form-label">Kata Laluan</label>
                <input type="password" id="userPass" class="form-control" placeholder="Masukkan Kata Laluan">
            </div>
            <button class="btn btn-primary w-100" style="background-color: var(--night-blue);" onclick="handleLogin()">Masuk</button>
            <div id="loginError" class="text-danger mt-2 small text-center" style="display:none;">ID atau Kata Laluan Salah!</div>
        </div>
    </div>

    <div id="dashboardSection" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 id="dashboardTitle">Dashboard</h4>
            <button class="btn btn-danger btn-sm no-print" onclick="handleLogout()">Keluar</button>
        </div>

        <div class="card p-3 mb-4 no-print">
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="small fw-bold">Pilih Tingkatan</label>
                    <select id="formSelect" class="form-select" onchange="loadFormDetails()">
                        <option value="">-- Sila Pilih --</option>
                        <option value="1">Tingkatan 1</option>
                        <option value="2">Tingkatan 2</option>
                        <option value="3">Tingkatan 3</option>
                        <option value="4">Tingkatan 4</option>
                        <option value="5">Tingkatan 5</option>
                    </select>
                </div>
                <div id="classSelectDiv" class="col-md-4" style="display:none;">
                    <label class="small fw-bold">Pilih Kelas</label>
                    <select id="classSelect" class="form-select" onchange="filterData()">
                        </select>
                </div>
                <div id="subjectSelectDiv" class="col-md-4" style="display:none;">
                    <label class="small fw-bold">Pilih Subjek</label>
                    <select id="subjectSelect" class="form-select" onchange="filterBySubject()">
                        </select>
                </div>
            </div>
        </div>

        <div id="contentArea">
            <div id="summaryCards" class="row"></div>
            
            <div class="card p-3 mt-3">
                <div class="d-flex justify-content-between mb-2 no-print">
                    <h5 id="tableHeading">Data Pelajar</h5>
                    <div>
                        <button class="btn btn-success btn-sm me-2" onclick="saveToLocal()"><i class="fas fa-save me-1"></i>Simpan</button>
                        <button class="btn btn-info btn-sm text-white" onclick="printAllSlips()"><i class="fas fa-print me-1"></i>Cetak Slip Pukal</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm table-hover table-bordered align-middle" id="mainDataTable">
                        <thead>
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="row mt-4 no-print">
                <div class="col-md-6">
                    <div class="card p-3">
                        <h6>Analisis Gred</h6>
                        <div class="chart-container">
                            <canvas id="gradeChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-3">
                        <h6>Status Kelulusan</h6>
                        <div class="chart-container">
                            <canvas id="passFailChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="printContainer" class="print-only"></div>

<footer class="footer text-center no-print">
    <div class="container">
        <p class="mb-0 text-center">Hakcipta &copy; NDJE@Selirik, Kapit 2026</p>

</footer>

<script>
/** * CONFIGURATION & GLOBAL DATA
 */
const CSV_LINKS = {
    1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9ngcL37KMX8ZDsGKomo7Lv6yowNqFdcWciJuvS1UkUU6aFHI_VKuFDLP1d0fKtMlXTW8APMYD38xZ/pub?gid=1419213935&single=true&output=csv",
    2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD6QwXil_0_gA0OBb2t82FneuCt68Sp7P9-He4zyBPEoaVHkJent8hiCSFPa33F-AEmR9BgeEogpt-/pub?gid=1419213935&single=true&output=csv",
    3: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg40cTCNS7MVyZVA3-8sZkbNtVT_Db9abxz6xhv1ccZ5ZksWIy0qyn8y30lqxG9G9YN1TOMBXF7WCY/pub?gid=1419213935&single=true&output=csv",
    4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR831uDWcPfxf9zOj-mekolv_DMkdsYRMdVsxoLcKqwL88z-tetvP57ti5wB5M2dYIXYVZf9eX7R6Q8/pub?gid=1615224868&single=true&output=csv",
    5: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq9lzeK5sombRvA2WRgEYGygUdZwEfifZHVy4IMZiRD7c-yll60qkA4pXeBBocqJsRV6GpM1uazU_B/pub?gid=1615224868&single=true&output=csv"
};

const SCRIPT_LINKS = {
    1: "https://script.google.com/macros/s/AKfycbzI4uyIyKd5O0do0KQRbdjuzay3OMUBpN0EuJCOtbcAI4dAmh0Fj_n_CTsCX9mwdeNsEg/exec",
    2: "https://script.google.com/macros/s/AKfycbw0BakCGDqNheCPyzdqrstH8jM0Je3D1fM2oJTB0odH5UIAO08GNdOSIqWMK6e1ZQmL/exec",
    3: "https://script.google.com/macros/s/AKfycbwGVcnpPo2ASHnvXyvfCB2PQSYi9XtITDEF6YGC7G0idbXmw13TixmF02846I2593dH/exec",
    4: "https://script.google.com/macros/s/AKfycbztn63Bhbjl6EKwvVFadcYNY3jzA0Nuty-_veEYQBkLenytXxQWZY5h7GweO3maDLn0/exec",
    5: "https://script.google.com/macros/s/AKfycbxg5tGuWQ6U8Aou1tG-m5PXWEyfbfcq_maaL_W8awU35NiBf3v-7c8peqQMeBCIqIdUsQ/exec"
};

const ULASAN_DROPDOWN = [
    "Teruskan berusaha untuk kejayaan lebih cemerlang untuk masa depan yang gemilang",
    "Sekalung tahniah atas kejayaan anda. Teruskan Usaha dengan lebih gigih untuk kejayaan lebih baik.",
    "Prestasi anda memberangsangkan. Usaha lagi untuk kejayaan yang lebih cemerlang",
    "Anda mesti mempunyai motivasi yang tinggi dan minat terhadap pengajaran dan pembelajaran di dalam kelas. Anda mampu mencapai lebih kecemerlangan dengan bersikap proaktif di dalam kelas.",
    "Keputusan semasa menunjukkan anda masih belum menemui cara belajar yang betul bagi mendapatkan keputusan yang lebih baik",
    "Keputusan masih ditahap sederhana. Ia memerlukan komitmen daripada anda untuk memperbaiki pencapaian",
    "Anda harus berusaha dengan lebih gigih bagi mendapatkan keputusan yang sebaiknya. Jangan berlengah lagi",
    "Beberapa mata pelajaran masih belum mencapai tahap yang sepatutnya. Usaha dengan lebih kuat bagi memperbaiki prestasi",
    "Berikan lebih tumpuan kepada matapelajaran tertentu.",
    "Kejayaan tertakluk kepada daya usaha anda. Oleh itu tingkatkan usaha anda untuk kejayaan yang lebih baik daripada hari ini.",
    "Usaha anda telah menunjukkan hasil yang agak baik. Gandakan usaha anda untuk mencapai kejayaan yang lebih baik.",
    "Usaha dengan lebih kuat lagi. Pastikan keputusan kali ini dapat diubah melalui kerja keras selepas ini",
    "Usaha berterusan menjamin keputusan yang lebih baik pada masa akan datang",
    "Tingkatkan usaha anda. Anda pasti akan berjaya dengan lebih baik daripada hari ini.",
    "Hargai masa dan tingkatkan usaha anda.",
    "Pencapaian masih lemah. Tingkatkan usaha dan ubah sikap demi masa depan anda.",
    "Hargailah masa dan buangkan sikap kerap ponteng kelas. Pencapaian memuaskan. Teruskan usaha anda. Anda pasti berjaya."
];

// Subject mapping by Column Index (A=0, B=1, etc)
const SUBJECTS_UPPER = [
    { name: "BAHASA MELAYU", short: "BM", m: 4, g: 5 },
    { name: "SEJARAH", short: "SEJ", m: 6, g: 7 },
    { name: "ENGLISH LANGUAGE", short: "ENG", m: 8, g: 9 },
    { name: "MATEMATIK", short: "MATHS", m: 10, g: 11 },
    { name: "PENDIDIKAN MORAL", short: "PM", m: 12, g: 13 },
    { name: "PENDIDIKAN ISLAM", short: "PI", m: 14, g: 15 },
    { name: "SAINS", short: "SN", m: 16, g: 17 },
    { name: "PENDIDIKAN SENI VISUAL", short: "PSV", m: 18, g: 19 },
    { name: "BAHASA IBAN", short: "BIB", m: 20, g: 21 },
    { name: "REKA CIPTA", short: "RC", m: 22, g: 23 },
    { name: "PENGAJIAN PENIAGAAN", short: "PP", m: 24, g: 25 },
    { name: "PHYSICS", short: "FIZ", m: 26, g: 27 },
    { name: "CHEMISTRY", short: "KIM", m: 28, g: 29 },
    { name: "BIOLOGY", short: "BIO", m: 30, g: 31 },
    { name: "ADDITIONAL MATHEMATICS", short: "ADD MATHS", m: 32, g: 33 },
    { name: "SAINS KOMPUTER", short: "SK", m: 34, g: 35 },
    { name: "KIMPALAN ARKA & GAS", short: "KAG", m: 36, g: 37 },
    { name: "PJPK", short: "PJPK", m: 62, g: 63 }
];

const SUBJECTS_LOWER = [
    { name: "BAHASA MELAYU", short: "BM", m: 4, g: 5 },
    { name: "ENGLISH LANGUAGE", short: "ENG", m: 6, g: 7 },
    { name: "MATEMATIK", short: "MATHS", m: 8, g: 9 },
    { name: "SEJARAH", short: "SEJ", m: 10, g: 11 },
    { name: "SAINS", short: "SN", m: 12, g: 13 },
    { name: "GEOGRAFI", short: "GEO", m: 14, g: 15 },
    { name: "BAHASA IBAN", short: "BIB", m: 16, g: 17 },
    { name: "PENDIDIKAN MORAL", short: "PM", m: 18, g: 19 },
    { name: "PENDIDIKAN ISLAM", short: "PI", m: 20, g: 21 },
    { name: "REKA BENTUK & TEKNOLOGI", short: "RBT", m: 22, g: 23 },
    { name: "ASAS SAINS KOMPUTER", short: "ASK", m: 24, g: 25 },
    { name: "PENDIDIKAN SENI VISUAL", short: "PSV", m: 26, g: 27 },
    { name: "PJPK", short: "PJPK", m: 40, g: 41 }
];

let currentUser = null;
let masterData = [];
let filteredData = [];
let charts = {};

/** * LOGIN SYSTEM
 */
function handleLogin() {
    const id = document.getElementById('userId').value;
    const pass = document.getElementById('userPass').value;
    const error = document.getElementById('loginError');

    if (id === 'GT2026' && pass === 'GT2026') {
        currentUser = { role: 'GT', name: 'Guru Tingkatan' };
    } else if (id === 'Admin7102' && pass === 'Admin7102') {
        currentUser = { role: 'ADMIN', name: 'Administrator' };
    } else if (id === 'KP7102' && pass === 'KP7102') {
        currentUser = { role: 'KP', name: 'Ketua Panitia' };
    } else {
        error.style.display = 'block';
        return;
    }

    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    document.getElementById('dashboardTitle').innerText = `Dashboard ${currentUser.name}`;
    
    // UI adjustment based on role
    if(currentUser.role === 'ADMIN' || currentUser.role === 'KP') {
        document.getElementById('subjectSelectDiv').style.display = 'block';
    }
    document.getElementById('classSelectDiv').style.display = 'block';
}

function handleLogout() {
    location.reload();
}

/** * DATA LOADING
 */
async function loadFormDetails() {
    const form = document.getElementById('formSelect').value;
    if(!form) return;

    const url = CSV_LINKS[form];
    
    Papa.parse(url, {
        download: true,
        header: false,
        complete: function(results) {
            // Assume row 0 is header, row 1 starts data
            masterData = results.data.filter(row => row[2] && row[2] !== "Nama"); // Column C (index 2) is Name
            populateClasses();
            populateSubjects();
            filterData();
        }
    });
}

function populateClasses() {
    const classSet = new Set();
    masterData.forEach(row => { if(row[3]) classSet.add(row[3]); }); // Column D (index 3) is Class
    
    const select = document.getElementById('classSelect');
    select.innerHTML = '<option value="">Semua Kelas</option>';
    Array.from(classSet).sort().forEach(c => {
        select.innerHTML += `<option value="${c}">${c}</option>`;
    });
}

function populateSubjects() {
    const form = document.getElementById('formSelect').value;
    const subs = (form > 3) ? SUBJECTS_UPPER : SUBJECTS_LOWER;
    const select = document.getElementById('subjectSelect');
    select.innerHTML = '<option value="">Semua Subjek</option>';
    subs.forEach(s => {
        select.innerHTML += `<option value="${s.m}">${s.name}</option>`;
    });
}

/** * DATA FILTERING & RENDERING
 */
function filterData() {
    const selClass = document.getElementById('classSelect').value;
    const form = document.getElementById('formSelect').value;
    
    if (selClass) {
        filteredData = masterData.filter(row => row[3] === selClass);
    } else {
        filteredData = masterData;
    }

    renderTable();
    updateCharts();
}

function renderTable() {
    const form = document.getElementById('formSelect').value;
    if(!form) return;

    const subs = (form > 3) ? SUBJECTS_UPPER : SUBJECTS_LOWER;
    const rumusanIndices = (form > 3) ? 
        { jum: 78, purata: 79, gp: 80, png: 81, kdk: 83, kdt: 101, ulasan: 100, guru: 102, kep: 82, ana: 84 } : 
        { jum: 54, purata: 55, gp: 56, kdk: 58, kdt: 69, ulasan: 60, guru: 70, kep: 62, ana: 59 };

    let headerHtml = '<th>Bil</th><th>Nama</th><th>Kelas</th>';
    subs.forEach(s => { headerHtml += `<th>${s.short}</th>`; });
    headerHtml += '<th>JUM</th><th>GP</th><th>KDK</th><th>KDT</th>';
    if(currentUser.role === 'GT') headerHtml += '<th>Ulasan</th>';

    document.getElementById('tableHeader').innerHTML = headerHtml;

    let bodyHtml = '';
    filteredData.forEach((row, index) => {
        bodyHtml += `<tr>
            <td>${index + 1}</td>
            <td class="small fw-bold">${row[2]}</td>
            <td class="small">${row[3]}</td>`;
        
        subs.forEach(s => {
            const mark = row[s.m];
            const gred = row[s.g];
            const display = (mark === 'NULL' || !mark) ? '-' : `${mark} (${gred})`;
            bodyHtml += `<td class="text-center small">${display}</td>`;
        });

        bodyHtml += `
            <td class="fw-bold">${row[rumusanIndices.jum] || '-'}</td>
            <td>${row[rumusanIndices.gp] || '-'}</td>
            <td>${row[rumusanIndices.kdk] || '-'}</td>
            <td>${row[rumusanIndices.kdt] || '-'}</td>
        `;

        if(currentUser.role === 'GT') {
            let ulasanOpts = `<option value="">-- Pilih --</option>`;
            ULASAN_DROPDOWN.forEach(u => {
                const selected = (row[rumusanIndices.ulasan] === u) ? 'selected' : '';
                ulasanOpts += `<option value="${u}" ${selected}>${u.substring(0,30)}...</option>`;
            });
            bodyHtml += `<td><select class="form-select form-select-sm ulasan-input" data-idx="${index}">${ulasanOpts}</select></td>`;
        }
        bodyHtml += '</tr>';
    });

    document.getElementById('tableBody').innerHTML = bodyHtml;
}

/** * CHARTS & ANALYSIS
 */
function updateCharts() {
    const form = document.getElementById('formSelect').value;
    if(!form || filteredData.length === 0) return;

    const rumusanIndices = (form > 3) ? { ana: 84, kep: 82 } : { ana: 59, kep: 62 };

    // Pass Fail Data
    let lulus = 0, gagal = 0;
    filteredData.forEach(row => {
        const status = (row[rumusanIndices.kep] || '').toUpperCase();
        if(status.includes('LULUS')) lulus++;
        else if(status.includes('GAGAL')) gagal++;
    });

    renderPassFailChart(lulus, gagal);
}

function renderPassFailChart(lulus, gagal) {
    if(charts.passFail) charts.passFail.destroy();
    const ctx = document.getElementById('passFailChart').getContext('2d');
    charts.passFail = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Lulus', 'Gagal'],
            datasets: [{
                data: [lulus, gagal],
                backgroundColor: ['#2ecc71', '#e74c3c']
            }]
        },
        options: { maintainAspectRatio: false }
    });
}

/** * SAVING DATA
 */
function saveToLocal() {
    const form = document.getElementById('formSelect').value;
    const ulasanElements = document.querySelectorAll('.ulasan-input');
    const logs = [];

    ulasanElements.forEach(el => {
        const idx = el.getAttribute('data-idx');
        const val = el.value;
        if(val) {
            logs.push({ name: filteredData[idx][2], ulasan: val });
        }
    });

    localStorage.setItem(`smk_selirik_ulasan_f${form}`, JSON.stringify(logs));
    alert('Maklumat disimpan secara lokal! Sila pastikan anda menekan butang hantar ke Server MASTER jika tersedia.');
}

/** * PRINTING SYSTEM
 */
function printAllSlips() {
    const form = document.getElementById('formSelect').value;
    if(!form) return;

    const subs = (form > 3) ? SUBJECTS_UPPER : SUBJECTS_LOWER;
    const rumusanIndices = (form > 3) ? 
        { jum: 78, purata: 79, gp: 80, png: 81, kdk: 83, kdt: 101, ulasan: 100, guru: 102, kep: 82, ana: 84 } : 
        { jum: 54, purata: 55, gp: 56, kdk: 58, kdt: 69, ulasan: 60, guru: 70, kep: 62, ana: 59 };

    let printHtml = '';

    filteredData.forEach(row => {
        printHtml += `
        <div class="page-break p-4">
            <div class="text-center mb-4 slip-header">
                <img src="https://i.ibb.co/670hn3CB/smk-selirik.png" style="width:100%; max-height:120px; object-fit:contain;">
                <h4 class="mt-2">SLIP KEPUTUSAN PEPERIKSAAN PERTENGAHAN 1 (MAC) 2026</h4>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <p class="mb-1"><strong>NAMA:</strong> ${row[2]}</p>
                    <p class="mb-1"><strong>KELAS:</strong> ${row[3]}</p>
                </div>
                <div class="col-6 text-end">
                    <p class="mb-1"><strong>TINGKATAN:</strong> ${form}</p>
                    <p class="mb-1"><strong>TARIKH:</strong> ${new Date().toLocaleDateString('ms-MY')}</p>
                </div>
            </div>
            <table class="table table-bordered table-sm">
                <thead class="table-light">
                    <tr>
                        <th>MATA PELAJARAN</th>
                        <th class="text-center">MARKAH</th>
                        <th class="text-center">GRED</th>
                    </tr>
                </thead>
                <tbody>`;
        
        subs.forEach(s => {
            const m = row[s.m];
            const g = row[s.g];
            if(m && m !== 'NULL') {
                printHtml += `<tr>
                    <td>${s.name}</td>
                    <td class="text-center">${m}</td>
                    <td class="text-center">${g}</td>
                </tr>`;
            }
        });

        printHtml += `
                </tbody>
            </table>
            <div class="row mt-4">
                <div class="col-6">
                    <table class="table table-sm table-bordered">
                        <tr><td>JUMLAH MARKAH</td><td>${row[rumusanIndices.jum]}</td></tr>
                        <tr><td>GRED PURATA (GP)</td><td>${row[rumusanIndices.gp]}</td></tr>
                    </table>
                </div>
                <div class="col-6">
                    <table class="table table-sm table-bordered">
                        <tr><td>KDK</td><td>${row[rumusanIndices.kdk]}</td></tr>
                        <tr><td>KDT</td><td>${row[rumusanIndices.kdt]}</td></tr>
                    </table>
                </div>
            </div>
            <div class="p-3 border mt-3" style="min-height:80px;">
                <strong>ULASAN GURU KELAS:</strong><br>
                ${row[rumusanIndices.ulasan] || 'Tiada Ulasan'}
            </div>
            <div class="row mt-5">
                <div class="col-6">
                    <p class="mb-0">................................................</p>
                    <p class="small fw-bold">AWIN ANAK ENGGA<br>PENGETUA<br>SMK SELIRIK</p>
                </div>
                <div class="col-6 text-end">
                    <p class="mb-0">................................................</p>
                    <p class="small fw-bold">${(row[rumusanIndices.guru] || 'GURU KELAS').toUpperCase()}<br>GURU TINGKATAN ${row[3]}<br>SMK SELIRIK</p>
                </div>
            </div>
        </div>`;
    });

    document.getElementById('printContainer').innerHTML = printHtml;
    window.print();
}

</script>
</body>
</html>
